[book]
title       = "kiteguard"
description = "Runtime security guardrails for Claude Code and AI coding agents"
authors     = ["kiteguard contributors"]
language    = "en"
src         = "src"

[output.html]
site-url          = "/kiteguard/"
git-repository-url = "https://github.com/DhivakaranRavi/kiteguard"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/DhivakaranRavi/kiteguard/edit/main/docs/src/{path}"
additional-css    = ["custom.css"]
no-section-label  = false

[output.html.fold]
enable   = true
level    = 1

[output.html.search]
enable   = true
limit-results = 20
