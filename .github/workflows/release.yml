name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: kiteguard-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: kiteguard-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: kiteguard-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: kiteguard-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install Node (console build)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build console
        run: |
          cd console
          npm ci --ignore-scripts
          npm audit --audit-level=moderate
          npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package tarball
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/kiteguard dist/
          cd dist
          tar czf ../${{ matrix.artifact }}.tar.gz kiteguard
          cd ..
          sha256sum ${{ matrix.artifact }}.tar.gz | awk '{print $1}' > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -name 'kiteguard-*' | sort | xargs sha256sum > checksums.sha256
          cat checksums.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.sha256
            artifacts/checksums.sha256
          generate_release_notes: true
